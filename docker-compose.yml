services:
  # GPU
  tei:
      image: ghcr.io/huggingface/text-embeddings-inference:latest
      command: >
        --model-id Qwen/Qwen3-Embedding-0.6B
        --auto-truncate 
        --max-batch-tokens 8192
        --max-concurrent-requests 16
      ports:
        - "${TEI_PORT}:80"
      volumes:
        - ./data/tei_data:/data
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      healthcheck:
        test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
        interval: 15s
        timeout: 10s
        retries: 10

  # CPU
  # tei:
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
  #   command: >
  #     --model-id onnx-community/Qwen3-Embedding-0.6B-ONNX
  #     --pooling last-token
  #     --auto-truncate 
  #     --max-batch-tokens 2048
  #   ports:
  #     - "${TEI_PORT}:80"
  #   volumes:
  #     - ./data/tei_data_cpu:/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
  #     interval: 15s
  #     retries: 10

  # tei-reranker:
  #   image: ghcr.io/huggingface/text-embeddings-inference:latest
  #   command: >
  #     --model-id BAAI/bge-reranker-v2-m3
  #     --auto-truncate 
  #     --max-batch-tokens 8192
  #     --max-concurrent-requests 16
  #   ports:
  #     - "8081:80"  # Вешаем на другой порт
  #   volumes:
  #     - ./data/tei_reranker_data:/data
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - ./data/qdrant_data:/qdrant/storage:z # :z лечит проблемы с правами в Linux
    healthcheck:
      test: ["CMD-SHELL", "ls /qdrant/storage/raft_state.json || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 10

  # Кэш (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      - REDIS_CLUSTER_ENABLED=false
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # Основная БД для Langfuse
  langfuse-db:
    image: postgres:16-alpine
    profiles: ["debug"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Аналитическая БД для Langfuse v3
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    profiles: ["debug"]
    environment:
    - CLICKHOUSE_USER=${CH_USER}
    - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
    - CLICKHOUSE_DB=${CH_DB}
    - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
      image: langfuse/langfuse:3
      profiles: ["debug"]
      depends_on:
        langfuse-db: { condition: service_healthy }
        clickhouse: { condition: service_healthy }
        redis: { condition: service_healthy }
        minio: { condition: service_healthy }
      ports:
        - "${LANGFUSE_PORT}:3000"
      environment:
        - NODE_ENV=production
        - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@langfuse-db:5432/${POSTGRES_DB}
        - CLICKHOUSE_URL=http://clickhouse:8123/${CH_DB}
        # Исправлено: используем переменные для миграций
        - CLICKHOUSE_MIGRATION_URL=clickhouse://${CH_USER}:${CH_PASSWORD}@clickhouse:9000/${CH_DB}
        - CLICKHOUSE_USER=${CH_USER}
        - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
        - CLICKHOUSE_DB=${CH_DB}
        - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
        - NEXTAUTH_URL=${NEXTAUTH_URL}
        - ENCRYPTION_KEY=${ENCRYPTION_KEY}
        - SALT=${SALT}
        - REDIS_CONNECTION_STRING=redis://redis:6379/0
        - LANGFUSE_INGESTION_QUEUE_TYPE=redis
        - LANGFUSE_OTEL_INGESTION_QUEUE_TYPE=redis
        - LANGFUSE_ENABLE_WORKER_IN_WEB_CONTAINER=false
        # S3 / Minio
        - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
        - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID}
        - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY}
        - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
        - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
        - AWS_REGION=${LANGFUSE_S3_EVENT_UPLOAD_REGION:-us-east-1}

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: ["debug"]
    depends_on:
      langfuse: { condition: service_started }
      redis: { condition: service_healthy }
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@langfuse-db:5432/${POSTGRES_DB}
      - CLICKHOUSE_URL=http://clickhouse:8123/${CH_DB}
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DB=${CH_DB}
      - REDIS_CONNECTION_STRING=redis://redis:6379/0
      - LANGFUSE_INGESTION_QUEUE_TYPE=redis
      - LANGFUSE_OTEL_INGESTION_QUEUE_TYPE=redis
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - AWS_REGION=${LANGFUSE_S3_EVENT_UPLOAD_REGION:-us-east-1}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SALT=${SALT}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL} # Добавлено для консистентности

  api:
    build: .
    ports:
      - "${API_PORT}:8000"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      tei:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  langfuse_db_data:
  clickhouse_data: