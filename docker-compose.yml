services:
  tei:
      # GPU
      image: ghcr.io/huggingface/text-embeddings-inference:latest
      command: >
        --model-id Qwen/Qwen3-Embedding-0.6B
        --auto-truncate 
        --max-batch-tokens 8192
        --max-concurrent-requests 16
      ports:
        - "${TEI_PORT}:80"
      volumes:
        - ./data/tei_data:/data
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
      healthcheck:
        test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
        interval: 15s
        timeout: 10s
        retries: 10

  # tei:
  #   СPU
  #   image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
  #   command: >
  #     --model-id onnx-community/Qwen3-Embedding-0.6B-ONNX
  #     --auto-truncate 
  #     --max-batch-tokens 2048
  #   ports:
  #     - "${TEI_PORT}:80"
  #   volumes:
  #     - ./data/tei_data_cpu:/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
  #     interval: 15s
  #     retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT}:6333"
    volumes:
      - ./data/qdrant_data:/qdrant/storage:z # :z лечит проблемы с правами в Linux
    healthcheck:
      test: ["CMD-SHELL", "ls /qdrant/storage/raft_state.json || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 10

  # Кэш (Redis)
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # Основная БД для Langfuse
  langfuse-db:
    image: postgres:16-alpine
    profiles: ["debug"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Аналитическая БД для Langfuse v3
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    profiles: ["debug"]
    environment:
      CLICKHOUSE_USER: ${CH_USER}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
      CLICKHOUSE_DB: ${CH_DB}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:3
    profiles: ["debug"]
    depends_on:
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "${LANGFUSE_PORT}:3000"
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@langfuse-db:5432/${POSTGRES_DB}
      
      # ClickHouse
      - CLICKHOUSE_URL=http://clickhouse:8123/${CH_DB}
      - CLICKHOUSE_MIGRATION_URL=clickhouse://${CH_USER}:${CH_PASSWORD}@clickhouse:9000/${CH_DB}
      - CLICKHOUSE_USER=${CH_USER}
      - CLICKHOUSE_PASSWORD=${CH_PASSWORD}
      - CLICKHOUSE_DB=${CH_DB}
      - CLICKHOUSE_CLUSTER_ENABLED=false

      # Auth & Security (Убедитесь, что в .env нет пробелов!)
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SALT=${SALT}
      - TELEMETRY_ENABLED=false

      # ФИКС БАГА #8996 (Добавляем эти три строки обязательно)
      # --- ВМЕСТО СТАРЫХ НАСТРОЕК S3 ---
      # Отключаем попытки загрузки в облако
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=
      
      # Включаем прямую запись в БД (самый стабильный вариант для локалхоста)
      - LANGFUSE_DIRECT_DB_CONNECTION=true
      
      # Если ты используешь Langfuse v3, ему всё равно может быть нужен 
      # "фейковый" драйвер, чтобы не ругаться на отсутствие AWS SDK. 
      # Попробуй сначала просто убрать бакет.
      # Ваше приложение
  api:
    build: .
    ports:
      - "${API_PORT}:8000"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      tei:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  langfuse_db_data:
  clickhouse_data: